name: hourly-taxi-demand-inference-pipeline

on:
  workflow_run:
    workflows:
      - "hourly-taxi-demand-feature-pipeline-with-cache"
    types:
      - completed

  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  POETRY_URL: "https://install.python-poetry.org"

jobs:
  inference-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Cache Poetry
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: poetry-cache-${{ runner.os }}-${{ env.PYTHON_VERSION }}

      - name: Cache Packages
        uses: actions/cache@v3
        with:
          path: ~/.local
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: |
          curl -sSL ${{ env.POETRY_URL }} | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Check Poetry Version
        run: poetry --version

      - name: Install Dependencies
        run: poetry install

      - name: Execute inference notebook
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
        run: |
          poetry run jupyter nbconvert \
            --to notebook \
            --execute notebooks/14_inference_pipeline.ipynb \
            --output executed_inference.ipynb